<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Proof</title>
<style>
  :root{
    --ink:#1b1a18; --paper:#ffffff; --line:#e4e0d8; --muted:#9a948a; --accent:#3a5a6b;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Times New Roman",Georgia,serif;
    --sans:-apple-system,system-ui,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#efece6;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .sheet{max-width:1080px;margin:30px auto;background:var(--paper);padding:40px 48px 26px;
         box-shadow:0 1px 0 rgba(0,0,0,.04),0 14px 44px rgba(0,0,0,.07);border:1px solid #eee}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase}
  .rule{height:1px;background:var(--line);border:0;margin:18px 0}

  .head{display:flex;justify-content:space-between;align-items:baseline;gap:24px}
  .title{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:.01em;color:#26425a}
  .title em{font-style:italic;font-weight:400;color:#2a2a2a}
  .orderno{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);text-align:right}
  .orderno b{font-size:19px;letter-spacing:.02em;color:var(--ink);margin-left:8px}
  .metarow{display:flex;align-items:center;gap:0;margin-top:2px}
  .meta{display:flex;gap:8px 18px;flex-wrap:wrap;flex:1}
  .meta .lbl{color:#55514a}.meta .lbl span{color:var(--muted)}
  .meta .sep{color:var(--line)}
  .pcode{display:flex;align-items:center;gap:7px;color:var(--muted);padding-left:18px;border-left:1px solid var(--line)}
  .pcode svg{width:14px;height:14px;opacity:.55}

  .center{text-align:center}
  .mocklbl{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:#3a5a6b;font-weight:600}
  .scale{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--muted);margin-top:3px}
  .mockwrap{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin:16px 0 4px}
  .mockwrap img{max-width:460px;width:100%;height:auto;display:block}
  .mockph{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.05em;
          padding:70px 40px;border:1px dashed var(--line);text-align:center}
  .measure{text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:#9c7b4f;margin:10px 0 2px}

  .band{display:flex;align-items:stretch}
  .col{padding:4px 26px;flex:0 0 auto}
  .col+.col{border-left:1px solid var(--line)}
  .col.grow{flex:1}
  .col h4{margin:0 0 14px;font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;color:#3a3a3a}
  .swatches{display:flex;gap:16px;flex-wrap:wrap}
  .sw{text-align:center;min-width:70px}
  .dot{width:56px;height:56px;border-radius:50%;margin:0 auto 8px;border:1px solid rgba(0,0,0,.10);
       box-shadow:inset 0 0 0 3px #fff,0 0 0 1px rgba(0,0,0,.06)}
  .sw .nm{font-family:var(--mono);font-size:9px;letter-spacing:.06em;line-height:1.4;text-transform:uppercase;color:#4a463f}
  .qty{font-family:var(--serif);font-size:15px;font-weight:600}
  .sizes{font-family:var(--mono);font-size:12px;letter-spacing:.03em;line-height:1.85}
  .sizes .s{display:inline-block;width:42px;font-weight:700}
  .vector{display:flex;gap:14px;align-items:flex-start}
  .vector .art{width:96px;height:70px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
               font-family:var(--mono);font-size:8px;color:var(--muted);overflow:hidden}
  .vector .art img{max-width:100%;max-height:100%}
  .vector .side .lbl{font-weight:700;color:#2a2a2a;font-size:10px}
  .vector .side .dim{font-family:var(--mono);font-size:9px;color:#6a655c;margin-top:6px}
  .notes{font-size:11px;line-height:1.5;color:#4a463f;max-width:220px;white-space:pre-wrap}

  .foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:22px}
  .disclaimer{font-size:8px;line-height:1.5;color:#bdb8ae;max-width:600px}
  .wordmark{font-family:var(--serif);font-size:15px;letter-spacing:.28em;color:#26425a;font-weight:700}
</style>
</head>
<body>
  <div class="sheet" id="sheet"></div>

<script>
/* =========================================================================
   INJECT POINT — Make подставляет d из Airtable.
     d.orderNo        <- Design Request: Order
     d.productName    <- Design Request: Request Name / Type of Request
     d.productCode    <- Design Request: SKU_new (A001)
     d.preparedFor    <- Design Request: Client
     d.date           <- Design Request: Order Date
     d.printMethod    <- метод (DTF/Screen/Embroider…)
     d.proofVersion   <- V1/V2…
     d.mockups[]      <- Design Request: PRODUCT MOCKUP  (URL или data:base64 — см. ниже)
     d.measurementsRaw<- Product: Measurements (свободный текст; парсим size/width/length)
     d.baseColors[]   <- name из Design Request Color Name (дедуп), hex из Product Colours HEX Equivalent
     d.printColors[]  <- {name, multicolor:true} для digital/DTF
     d.qty            <- Design Request: Quantity
     d.variantRaw     <- Design Request: Variant ("S / White - 6 pcs\n…")  -> размеры
     d.vectorArt[]    <- Artwork from Order (+ artworkSide/W/H — опц.)
   ========================================================================= */
const d = {
  orderNo:"SHPF1319", productName:"Short Sleeve T-Shirt", productCode:"A001",
  preparedFor:"Smug Mug", date:"06.22.26", printMethod:"DTF", proofVersion:"V1",
  scale:"100%",
  mockups:["https://v5.airtableusercontent.com/v3/u/54/54/1782842400000/LrgYKyqWefM088Vk75gQ7A/Geu7PQGB2l-ZOqCfT-zKko4KMD1eyd4MrOPbyCAKkIO_EUVc4D5wNw1qP2969ug_f-hLcGBU0AADDpfkwluHrYwymEwCM5Ywhh4swd_XgBnSqvgzNuy0lOwJZODmWrLXk-YSb5RoEf9fEE3YX5O-oQ/Y1w2dwM_5U7O0_WZ3SefENfLaT8yiLXsJz8I-aBmLo0"],
  measurementsRaw:"Size L measures:  \nlength from top of collar to hem:  73 cm.\nwidth from extended sleeve to sleeve:  86.5 cm\n",
  baseColors:[{name:"White", hex:"EFF0F1"}],     // hex из Product Colours
  printColors:[{name:"Multicolor Digital", multicolor:true}],
  qty:30,
  variantRaw:"S / White - 6 pcs\nM / White - 10 pcs\nL / White - 10 pcs\nXL / White - 4 pcs",
  vectorArt:[], artworkSide:"Front", artworkW:"28", artworkH:"15.18"
};

const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const hex=h=>{if(!h)return"";h=String(h).trim().replace(/^#/,"");return /^([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(h)?"#"+h:"";};
const has=a=>Array.isArray(a)&&a.length>0;

// Product.Measurements (свободный текст) -> {size,width,length}
function parseMeasurements(t){
  if(!t)return null;
  const sz=t.match(/size\s+([A-Za-z0-9]+)\s+measures/i);
  const w =t.match(/width[^0-9]*([\d.]+)\s*cm/i);
  const l =t.match(/length[^0-9]*([\d.]+)\s*cm/i);
  if(!w&&!l)return null;
  return {size:sz?sz[1]:"", width:w?w[1]:"", length:l?l[1]:""};
}
// Variant "S / White - 6 pcs" -> [{size,qty}]; иначе общий парсер "S: 6 / M: 10"
function parseSizes(str){
  if(!str)return[];
  let rows=String(str).split(/\n+/).map(line=>{
    const m=line.match(/^\s*([A-Za-z0-9]+)\s*\/.*?-\s*(\d+)\s*pcs/i); return m?{size:m[1],qty:+m[2]}:null;
  }).filter(Boolean);
  if(rows.length)return rows;
  return String(str).split(/[\/,;\n]/).map(p=>{const m=p.match(/([A-Za-z0-9]+)\s*[:\-]?\s*(\d+)/);return m?{size:m[1],qty:+m[2]}:null;}).filter(Boolean);
}
// дедуп base по имени (одинаковые -> 1)
function dedupeBase(list){
  const seen=new Set(),out=[];
  (list||[]).forEach(c=>{const k=(c.name||"").toLowerCase();if(!seen.has(k)){seen.add(k);out.push(c);}});
  return out;
}
function swatch(c){
  let bg = (c.multicolor||(!hex(c.hex)&&/multicolor|rainbow|digital/i.test(c.name||"")))
    ? "conic-gradient(from 90deg,#e23b3b,#e2a23b,#e2dd3b,#5ad24f,#3bb6e2,#5a4fd2,#c14fd2,#e23b3b)"
    : (hex(c.hex)||"#f0eee9");
  return `<div class="sw"><div class="dot" style="background:${bg}"></div><div class="nm">${esc(c.name||"")}${c.idx?(' #'+c.idx):''}</div></div>`;
}
function colorCol(title,list,number){
  if(!has(list))return"";
  const items=list.map((c,i)=>number?Object.assign({},c,{idx:i+1}):c);
  return `<div class="col"><h4>${title}</h4><div class="swatches">${items.map(swatch).join("")}</div></div>`;
}

function render(){
  const base=dedupeBase(d.baseColors);
  const sizes=has(d.sizes)?d.sizes:parseSizes(d.variantRaw||d.sizesRaw);
  const me=parseMeasurements(d.measurementsRaw);

  const mock=has(d.mockups)
    ? `<div class="mockwrap">${d.mockups.map(u=>`<img src="${esc(u)}" alt="mockup" onerror="this.outerHTML='<div class=\\'mockph\\'>[ PRODUCT MOCKUP — ссылка истекла, передайте base64 ]</div>'">`).join("")}</div>`
    : `<div class="mockwrap"><div class="mockph">[ PRODUCT MOCKUP — загрузите изображение ]</div></div>`;

  const measure=me
    ? `<div class="measure">PRODUCT MEASUREMENTS BASED ON SIZE ${esc(me.size)}: Width — ${esc(me.width)} cm, Length — ${esc(me.length)} cm</div>`
    : "";

  const vector = has(d.vectorArt) ? `<div class="col grow"><h4>Client Vector Artwork</h4>
      <div class="vector"><div class="art">${d.vectorArt.map(u=>`<img src="${esc(u)}">`).join("")||"ARTWORK"}</div>
      <div class="side"><div class="lbl">${esc(d.artworkSide||"")}</div>${(d.artworkW||d.artworkH)?`<div class="dim">W: ${esc(d.artworkW)} cm × H: ${esc(d.artworkH)} cm</div>`:""}</div></div></div>` : "";

  const band=[
    colorCol("Base Color", base, true),
    colorCol("Print Color", d.printColors, false),
    colorCol("Thread Color", d.threadColors, false),
    (d.qty!=null&&d.qty!=="")?`<div class="col"><h4>Qty : ${esc(d.qty)}</h4></div>`:"",
    has(sizes)?`<div class="col"><h4>Size Breakdown</h4><div class="sizes">${sizes.map(s=>`<div><span class="s">${esc(s.size)}</span>${esc(s.qty)}</div>`).join("")}</div></div>`:"",
    vector
  ].join("");

  document.getElementById("sheet").innerHTML=`
    <div class="head">
      <div class="title">CLIENT PROOF <em>${esc(d.productName||"")}</em></div>
      <div class="orderno">ORDER NO.<b>${esc(d.orderNo||"")}</b></div>
    </div>
    <hr class="rule">
    <div class="metarow">
      <div class="meta">
        <span class="lbl"><span>Prepared for:</span> ${esc((d.preparedFor||'').toUpperCase())}</span><span class="sep lbl">/</span>
        <span class="lbl"><span>Date:</span> ${esc(d.date||"")}</span><span class="sep lbl">/</span>
        <span class="lbl"><span>Print method:</span> ${esc(d.printMethod||"")}</span><span class="sep lbl">/</span>
        <span class="lbl"><span>Proof:</span> ${esc(d.proofVersion||"")}</span>
      </div>
      <div class="pcode lbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="14" r="4"/><path d="M11 14h9M17 14v4M20 14v3"/></svg>PRODUCT ${esc(d.productCode||"")}</div>
    </div>
    <hr class="rule">
    <div class="center"><div class="mocklbl">PRODUCT MOCKUP</div><div class="scale">${esc(d.scale||"100%")} SCALE</div></div>
    ${mock}
    ${measure}
    <hr class="rule">
    <div class="band">${band}</div>
    <div class="foot">
      <div class="disclaimer">Colors shown on screen are approximate and may differ from printed or stitched output; Pantone references are matched visually, not exact. By approving, you confirm all details are correct and authorize production — once approved, changes are not possible. Measurements are based on the listed reference size and may vary slightly across the run.</div>
      <div class="wordmark">OPENHOUSE</div>
    </div>`;
}
render();
</script>
</body>
</html>
